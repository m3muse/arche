<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#4f46e5" />
<title>Arche</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <button id="backBtn" class="back-btn" hidden>←</button>
  <div class="topbar-logo">
    <span class="logo-text">Arche</span>
  </div>
  <h1 id="title" class="topbar-page-title"></h1>
  <div class="topbar-right">
    <span id="profileChip" class="profile-chip">👤 <span id="profileName">guest</span></span>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="mul" data-i18n="tab.mul">곱하기</button>
  <button class="tab-btn" data-tab="div" data-i18n="tab.div">나누기</button>
  <button class="tab-btn" data-tab="pct" data-i18n="tab.pct">퍼센트</button>
  <button class="tab-btn" data-tab="settings" data-i18n="tab.settings">설정</button>
</nav>

<main id="app">
  <noscript>
    <p style="padding:20px;color:#fca5a5">JavaScript가 꺼져 있습니다. 브라우저에서 활성화해주세요.</p>
  </noscript>
  <p id="bootMsg" style="padding:20px;color:#94a3b8">Loading…</p>
</main>

<div id="globalError" style="display:none;position:fixed;left:0;right:0;bottom:0;padding:12px 16px;background:#7f1d1d;color:#fff;font-family:monospace;font-size:12px;white-space:pre-wrap;z-index:9999;max-height:50vh;overflow:auto"></div>

<script>
  window.addEventListener('error', function(e) {
    var el = document.getElementById('globalError');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = '[Error] ' + (e.message || e.error) + '\n' + (e.filename || '') + ':' + (e.lineno || '');
  });
  window.addEventListener('unhandledrejection', function(e) {
    var el = document.getElementById('globalError');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = '[Promise] ' + (e.reason && e.reason.message ? e.reason.message : e.reason);
  });
</script>
<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
